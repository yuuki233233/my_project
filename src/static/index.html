<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>实时监控面板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        body { background: #1a1a2e; color: #eee; font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; }
        .card h3 { margin-top: 0; text-align: center; }
        .chart { width: 100%; height: 280px; }
        .full { grid-column: 1 / -1; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .status { text-align: center; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Linux 服务器监控面板</h1>
    <div class="grid">
        <div class="card"><h3>🖥️ CPU 使用率</h3><div id="cpuChart" class="chart"></div></div>
        <div class="card"><h3>🧠 内存使用率</h3><div id="memChart" class="chart"></div></div>
        <div class="card"><h3>📖 磁盘读速率</h3><div id="diskReadChart" class="chart"></div></div>
        <div class="card"><h3>✍️ 磁盘写速率</h3><div id="diskWriteChart" class="chart"></div></div>
    </div>
    <div class="status">🔄 实时更新中...</div>
</div>

<script>
const charts = {};

function initCharts() {
    ['cpuChart', 'memChart', 'diskReadChart', 'diskWriteChart'].forEach(id => {
        const dom = document.getElementById(id);
        charts[id] = echarts.init(dom);
        charts[id].setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: [] },
            yAxis: { type: 'value', min: 0, max: 100 },
            series: [{ type: 'line', smooth: true, color: '#00d2ff', data: [] }]
        });
        // 自适应
        window.addEventListener('resize', () => charts[id].resize());
    });
}

function updateCharts() {
    fetch('/api/history/cpu')
        .then(r => r.json())
        .then(data => {
            const values = data.map(d => d.value);
            const times = data.map(d => d.time.slice(11, 19));
            charts['cpuChart'].setOption({
                xAxis: { data: times },
                series: [{ data: values, color: '#00d2ff' }]
            });
        });

    fetch('/api/history/memory')
        .then(r => r.json())
        .then(data => {
            const values = data.map(d => d.value);
            const times = data.map(d => d.time.slice(11, 19));
            charts['memChart'].setOption({
                xAxis: { data: times },
                series: [{ data: values, color: '#ff6b6b' }]
            });
        });

    fetch('/api/history/disk_read')
        .then(r => r.json())
        .then(data => {
            const values = data.map(d => d.value);
            const times = data.map(d => d.time.slice(11, 19));
            charts['diskReadChart'].setOption({
                xAxis: { data: times },
                yAxis: { type: 'value' },
                series: [{ data: values, color: '#feca57' }]
            });
        });

    fetch('/api/history/disk_write')
        .then(r => r.json())
        .then(data => {
            const values = data.map(d => d.value);
            const times = data.map(d => d.time.slice(11, 19));
            charts['diskWriteChart'].setOption({
                xAxis: { data: times },
                yAxis: { type: 'value' },
                series: [{ data: values, color: '#ff9ff3' }]
            });
        });
}

initCharts();
setInterval(updateCharts, 3000);
updateCharts();
</script>
</body>
</html>
